<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAHA LOSER</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: radial-gradient(circle at top, #222 0%, #000 70%);
        color: #ff2d55;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .message {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        pointer-events: none;
        z-index: 2;
        text-align: center;
      }

      .huge {
        font-size: 14vw;
        line-height: 0.9;
        letter-spacing: -0.03em;
        text-shadow: 0 0 30px rgba(255, 45, 85, 0.5);
      }

      .sub {
        font-size: 7vw;
        margin-top: 0.25em;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        text-shadow: 0 0 30px rgba(255, 45, 85, 0.35);
      }

      .float {
        position: absolute;
        top: calc(var(--y) * 100%);
        left: calc(var(--x) * 100%);
        font-size: calc(var(--s) * 6rem);
        opacity: 0.85;
        transform: translate(-50%, -50%) rotate(var(--r));
        animation: float var(--d) linear infinite;
        mix-blend-mode: screen;
        pointer-events: none;
      }

      @keyframes float {
        0% {
          transform: translate(-50%, -50%) rotate(var(--r));
          opacity: 0.8;
        }
        50% {
          transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(calc(var(--r) + 360deg));
          opacity: 0.3;
        }
        100% {
          transform: translate(-50%, -50%) rotate(calc(var(--r) + 720deg));
          opacity: 0.8;
        }
      }

      @media (max-width: 600px) {
        .huge {
          font-size: 18vw;
        }

        .sub {
          font-size: 9vw;
        }
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="message">
        <div class="huge">🖕</div>
        <div class="sub">HAHA LOSER</div>
      </div>
    </div>

    <script>
      const count = 160;
      const scene = document.querySelector('.scene');

      for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        span.className = 'float';
        span.textContent = '🖕';

        const rand = () => Math.random();
        const pick = (min, max) => Math.random() * (max - min) + min;

        span.style.setProperty('--x', rand());
        span.style.setProperty('--y', rand());
        span.style.setProperty('--s', pick(0.8, 2.8));
        span.style.setProperty('--d', `${pick(6, 16)}s`);
        span.style.setProperty('--r', `${pick(0, 360)}deg`);
        span.style.setProperty('--dx', `${pick(-50, 50)}px`);
        span.style.setProperty('--dy', `${pick(-50, 50)}px`);

        scene.appendChild(span);
      }
    </script>
  </body>
</html>
